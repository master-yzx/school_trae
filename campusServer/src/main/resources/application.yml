server:
  port: 6666

spring:
  servlet:
    multipart:
      # 不限制上传大小（注意：生产环境建议设置合理上限，避免磁盘被打满）
      max-file-size: -1
      max-request-size: -1
  datasource:
    url: jdbc:mysql://localhost:3306/campus_market?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

logging:
  level:
    root: info
    org.springframework.web: info

app:
  jwt:
    # IMPORTANT: change this in production (>= 32 chars), override via env if possible.
    secret: "campusSecondMarket-dev-secret-please-change-32bytes-min-2026"
    issuer: "campus-second-market"
    access-ttl-seconds: 900
    refresh-ttl-seconds: 604800
